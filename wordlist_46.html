    font-size: 13px;

    border-radius: 8px;

  select option { background: #2d5a3d; color: #fff; }

    padding: 0.6rem 2.5rem;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);

    padding: 2px 6px;

  .leg-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .table-wrap {
    padding: 1.5rem 2.5rem 3rem;

    width: 100%;

    border-radius: 12px;

    box-shadow: 0 1px 4px rgba(0,0,0,0.06);

  th:nth-child(3) { width: 30%; }
  th:nth-child(4) { width: 31%; }

function buildLegend() {
  const leg = document.getElementById('legend');
  Object.entries(SECTIONS).forEach(([key, val]) => {
    const el = document.createElement('span');
    el.className = 'leg-item';
    el.title = 'Фильтр: ' + key;
    el.innerHTML = `<span class="leg-dot" style="background:${val.color}"></span>${key}`;
    el.addEventListener('click', () => {
      const sel = document.getElementById('filter');
      sel.value = sel.value === key ? '' : key;
      render();
    });
    leg.appendChild(el);
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sec = document.getElementById('filter').value;
  const filtered = DATA.filter(r => {
    const matchSec = !sec || r[1] === sec;
    const matchQ = !q || r[0].toLowerCase().includes(q) || r[2].toLowerCase().includes(q) || r[3].toLowerCase().includes(q);
    return matchSec && matchQ;
  });
  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="no-results">Ничего не найдено — попробуйте другой запрос</td></tr>';
    document.getElementById('stats-text').innerHTML = 'Показано: <strong>0</strong> из ' + DATA.length + ' слов';
    return;
  }
  tbody.innerHTML = filtered.map(r => {
    const s = SECTIONS[r[1]];
    return `<tr>
      <td>${r[0]}</td>
      <td><span class="badge ${s.cls}">${r[1]}</span></td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
    </tr>`;
  }).join('');
  document.getElementById('stats-text').innerHTML = `Показано: <strong>${filtered.length}</strong> из ${DATA.length} слов`;
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filter').addEventListener('change', render);
buildLegend();
render();
</script>
